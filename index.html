<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北谷第二小学校 施設予約システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .reservation-cell.available { cursor: pointer; }
        .reservation-cell.available:hover { background-color: #dbeafe; }
        .reservation-cell.booked { cursor: pointer; background-color: #93c5fd; border-color: #60a5fa; color: #1e3a8a; }
        .reservation-cell.booked:hover { background-color: #60a5fa; }
    </style>
</head>
<body class="bg-blue-50 h-screen flex flex-col font-sans">
    
    <!-- ヘッダー -->
    <header class="bg-blue-700 shadow-sm border-b border-blue-800 px-6 py-4 flex justify-between items-center shrink-0">
        <h1 class="text-xl font-bold text-white">北谷第二小学校 施設予約システム</h1>
        <div class="flex items-center gap-4">
            <label for="datePicker" class="text-sm font-medium text-blue-100">日付選択:</label>
            <input type="date" id="datePicker" class="border border-blue-500 rounded px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-white bg-blue-600 text-white [color-scheme:dark]">
            <button id="todayBtn" class="bg-blue-600 hover:bg-blue-500 text-white border border-blue-400 px-3 py-1.5 rounded text-sm transition-colors">今日</button>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="flex-grow p-4 overflow-hidden flex flex-col">
        <div class="max-w-7xl mx-auto w-full h-full bg-white rounded-lg shadow-sm border border-blue-200 flex flex-col overflow-hidden">
            
            <!-- 日付表示 -->
            <div class="p-4 bg-blue-100 border-b border-blue-200 text-center shrink-0">
                <h2 id="currentDateDisplay" class="text-2xl font-semibold text-blue-900"></h2>
            </div>

            <!-- 予約表コンテナ -->
            <div class="overflow-auto flex-grow relative bg-white">
                <table class="w-full border-collapse min-w-[800px]">
                    <thead>
                        <tr id="facilitiesHeader">
                            <!-- JSで生成 -->
                        </tr>
                    </thead>
                    <tbody id="reservationTableBody">
                        <!-- JSで生成 -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- 予約モーダル -->
    <div id="reservationModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md overflow-hidden transform transition-all border border-blue-200">
            <div class="px-6 py-4 border-b border-blue-100 flex justify-between items-center bg-blue-50">
                <h3 id="modalTitle" class="text-lg font-medium text-blue-900">新規予約</h3>
                <button type="button" class="text-blue-400 hover:text-blue-600 focus:outline-none" onclick="closeModal()">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="px-6 py-4 space-y-4">
                <div>
                    <p id="modalInfo" class="text-sm text-blue-800 mb-4 bg-blue-50 p-2 rounded border border-blue-100"></p>
                </div>
                <div>
                    <label for="reserverName" class="block text-sm font-medium text-blue-900 mb-1">予約者名 (必須)</label>
                    <input type="text" id="reserverName" class="w-full border border-blue-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例：呉屋正樹／○年○組">
                </div>
                <div>
                    <label for="reservationPurpose" class="block text-sm font-medium text-blue-900 mb-1">使用目的 (任意)</label>
                    <input type="text" id="reservationPurpose" class="w-full border border-blue-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例: 職員会議 / クラブ活動">
                </div>
            </div>
            <div class="px-6 py-4 bg-blue-50 flex justify-between items-center border-t border-blue-100">
                <button type="button" id="cancelReservationBtn" class="text-red-500 hover:text-red-700 text-sm font-medium hidden" onclick="cancelReservation()">予約を取り消す</button>
                <div class="flex gap-2 ml-auto">
                    <button type="button" class="px-4 py-2 bg-white border border-blue-300 rounded-md text-sm font-medium text-blue-700 hover:bg-blue-50 focus:outline-none" onclick="closeModal()">キャンセル</button>
                    <button type="button" id="saveReservationBtn" class="px-4 py-2 bg-blue-600 border border-transparent rounded-md text-sm font-medium text-white hover:bg-blue-700 focus:outline-none" onclick="saveReservation()">予約する</button>
                </div>
            </div>
        </div>
    </div>

    <!-- トースト通知 -->
    <div id="toast" class="fixed bottom-4 right-4 bg-gray-800 text-white px-4 py-3 rounded shadow-lg transform transition-transform duration-300 translate-y-full opacity-0 flex items-center gap-2 z-50">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-green-400" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
        </svg>
        <span id="toastMessage"></span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // クラウドデータベース接続用の設定
const firebaseConfig = {
  apiKey: "AIzaSyDN7mO43wA4O8q1pzFniIZ5AiDx_bzr1Zk",
  authDomain: "fir-1e66a.firebaseapp.com",
  projectId: "fir-1e66a",
  storageBucket: "fir-1e66a.firebasestorage.app",
  messagingSenderId: "613804608794",
  appId: "1:613804608794:web:c226daa35289a5de61b0a3"
        let db = null;
        let auth = null;
        let currentUser = null;

        const timeSlots = [
            "１校時", "２校時", "３校時", "４校時", "給食中休み", "５校時", "６校時",
            "15時30分～16時30分", "16時30分～17時30分", "17時30分～18時30分", "18時30分～19時30分"
        ];
        
        const facilities = [
            "第一会議室", "第二会議室", "算数教室", "PC室", "１階多目", "３階多目",
            "体育館", "家庭科室", "もろみさん"
        ];

        let reservations = {};
        let currentDate = new Date();
        
        let currentSelectedCells = [];
        let currentEditingDate = '';
        
        let isDragging = false;
        let dragStart = null;
        let dragEnd = null;

        const datePicker = document.getElementById('datePicker');
        const todayBtn = document.getElementById('todayBtn');
        const currentDateDisplay = document.getElementById('currentDateDisplay');
        const facilitiesHeader = document.getElementById('facilitiesHeader');
        const reservationTableBody = document.getElementById('reservationTableBody');
        
        const reservationModal = document.getElementById('reservationModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalInfo = document.getElementById('modalInfo');
        const reserverNameInput = document.getElementById('reserverName');
        const reservationPurposeInput = document.getElementById('reservationPurpose');
        const saveReservationBtn = document.getElementById('saveReservationBtn');
        const cancelReservationBtn = document.getElementById('cancelReservationBtn');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        // HTMLからの呼び出し（onclick等）に対応するためグローバルに登録
        window.closeModal = closeModal;
        window.saveReservation = saveReservation;
        window.cancelReservation = cancelReservation;

        function formatDateForInput(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function formatDateForDisplay(date) {
            const days = ['日', '月', '火', '水', '木', '金', '土'];
            return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日 (${days[date.getDay()]})`;
        }

        function showToast(message) {
            toastMessage.textContent = message;
            toast.classList.remove('translate-y-full', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-full', 'opacity-0');
            }, 3000);
        }

        function renderTableHeaders() {
            facilitiesHeader.innerHTML = '';
            
            const emptyTh = document.createElement('th');
            emptyTh.className = 'border border-blue-200 p-3 w-32 bg-blue-100 sticky left-0 top-0 z-40 shadow-[1px_1px_0_0_#bfdbfe]'; 
            facilitiesHeader.appendChild(emptyTh);

            facilities.forEach(facility => {
                const th = document.createElement('th');
                th.className = 'border border-blue-200 p-3 text-sm font-semibold text-blue-900 min-w-[120px] sticky top-0 z-30 bg-blue-100 shadow-[0_1px_0_0_#bfdbfe]'; 
                th.textContent = facility;
                facilitiesHeader.appendChild(th);
            });
        }

        function renderTableBody(dateStr) {
            reservationTableBody.innerHTML = '';
            const dailyReservations = reservations[dateStr] || {};

            timeSlots.forEach((slot, timeIdx) => {
                const tr = document.createElement('tr');
                
                const th = document.createElement('th');
                th.className = 'border border-blue-200 p-3 text-sm font-medium text-blue-800 bg-blue-50 sticky left-0 z-20 shadow-[1px_0_0_0_#bfdbfe] whitespace-nowrap'; 
                th.textContent = slot;
                tr.appendChild(th);

                facilities.forEach((facility, facIdx) => {
                    const td = document.createElement('td');
                    const cellKey = `${timeIdx}_${facIdx}`;
                    const reservation = dailyReservations[cellKey];

                    td.dataset.timeIdx = timeIdx;
                    td.dataset.facIdx = facIdx;
                    td.className = 'border border-blue-200 p-2 text-sm text-center h-16 reservation-cell relative group select-none ';
                    
                    if (reservation) {
                        td.classList.add('booked');
                        
                        const nameDiv = document.createElement('div');
                        nameDiv.className = 'font-bold truncate px-1';
                        nameDiv.textContent = reservation.name;
                        td.appendChild(nameDiv);

                        if (reservation.purpose) {
                            const purposeDiv = document.createElement('div');
                            purposeDiv.className = 'text-xs truncate px-1 opacity-80';
                            purposeDiv.textContent = reservation.purpose;
                            td.appendChild(purposeDiv);
                        }
                    } else {
                        td.classList.add('available');
                        const addIcon = document.createElement('div');
                        addIcon.className = 'absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 text-blue-500 transition-opacity';
                        addIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>';
                        td.appendChild(addIcon);
                    }

                    td.addEventListener('mousedown', (e) => handleMouseDown(e, dateStr, timeIdx, facIdx, reservation));
                    td.addEventListener('mouseenter', () => handleMouseEnter(dateStr, timeIdx, facIdx));
                    
                    tr.appendChild(td);
                });

                reservationTableBody.appendChild(tr);
            });
        }

        function clearSelectionUI() {
            document.querySelectorAll('.reservation-cell').forEach(cell => {
                cell.classList.remove('ring-2', 'ring-blue-500', 'bg-blue-200', 'z-10');
                if (!cell.classList.contains('booked')) {
                    cell.classList.add('available');
                }
            });
        }

        function updateSelectionUI(dateStr) {
            clearSelectionUI();
            currentSelectedCells = [];

            if (!dragStart || !dragEnd) return;

            const minTime = Math.min(dragStart.timeIdx, dragEnd.timeIdx);
            const maxTime = Math.max(dragStart.timeIdx, dragEnd.timeIdx);
            const minFac = Math.min(dragStart.facIdx, dragEnd.facIdx);
            const maxFac = Math.max(dragStart.facIdx, dragEnd.facIdx);

            const dailyReservations = reservations[dateStr] || {};

            for (let t = minTime; t <= maxTime; t++) {
                for (let f = minFac; f <= maxFac; f++) {
                    const cellKey = `${t}_${f}`;
                    if (!dailyReservations[cellKey]) {
                        currentSelectedCells.push({ timeIdx: t, facIdx: f });
                        const td = document.querySelector(`td[data-time-idx="${t}"][data-fac-idx="${f}"]`);
                        if (td) {
                            td.classList.remove('available');
                            td.classList.add('ring-2', 'ring-blue-500', 'bg-blue-200', 'z-10');
                        }
                    }
                }
            }
        }

        function handleMouseDown(e, dateStr, timeIdx, facIdx, reservation) {
            if (e.button !== 0) return; 

            currentEditingDate = dateStr;

            if (reservation) {
                openModal(dateStr, [{ timeIdx, facIdx }], reservation);
                return;
            }

            isDragging = true;
            dragStart = { timeIdx, facIdx };
            dragEnd = { timeIdx, facIdx };
            updateSelectionUI(dateStr);
            e.preventDefault(); 
        }

        function handleMouseEnter(dateStr, timeIdx, facIdx) {
            if (!isDragging) return;
            if (currentEditingDate !== dateStr) return;
            
            dragEnd = { timeIdx, facIdx };
            updateSelectionUI(dateStr);
        }

        function openModal(dateStr, cells, existingReservation) {
            currentSelectedCells = cells;
            currentEditingDate = dateStr;
            
            const displayDate = `${currentDate.getFullYear()}年${currentDate.getMonth() + 1}月${currentDate.getDate()}日`;
            
            if (cells.length === 1) {
                const { timeIdx, facIdx } = cells[0];
                modalInfo.textContent = `${displayDate} | ${timeSlots[timeIdx]} | ${facilities[facIdx]}`;
            } else {
                const uniqueFacilities = [...new Set(cells.map(c => facilities[c.facIdx]))];
                const minT = Math.min(...cells.map(c => c.timeIdx));
                const maxT = Math.max(...cells.map(c => c.timeIdx));
                
                if (uniqueFacilities.length === 1) {
                    modalInfo.textContent = `${displayDate} | ${timeSlots[minT]} 〜 ${timeSlots[maxT]} | ${uniqueFacilities[0]}`;
                } else {
                    modalInfo.textContent = `${displayDate} | 複数選択 (${cells.length}枠)`;
                }
            }

            reserverNameInput.value = '';
            reservationPurposeInput.value = '';
            reserverNameInput.classList.remove('border-red-500');

            if (existingReservation) {
                modalTitle.textContent = '予約の確認・編集';
                reserverNameInput.value = existingReservation.name;
                reservationPurposeInput.value = existingReservation.purpose || '';
                saveReservationBtn.textContent = '更新する';
                cancelReservationBtn.classList.remove('hidden');
            } else {
                modalTitle.textContent = '新規予約';
                saveReservationBtn.textContent = '予約する';
                cancelReservationBtn.classList.add('hidden');
            }

            reservationModal.classList.remove('hidden');
            reservationModal.classList.add('flex');
            
            setTimeout(() => {
                reserverNameInput.focus();
            }, 50);
        }

        function closeModal() {
            reservationModal.classList.add('hidden');
            reservationModal.classList.remove('flex');
            currentSelectedCells = [];
            currentEditingDate = '';
            clearSelectionUI();
        }

        // データベースに同期する処理
        async function syncToDatabase(dateStr) {
            if (!db || !currentUser) {
                // クラウド設定がない環境（GitHub Pagesにそのまま上げた場合など）ではローカルの更新のみ
                updateView();
                return;
            }
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'facility_reservations', dateStr);
                await setDoc(docRef, { slots: reservations[dateStr] || {} });
            } catch (error) {
                console.error("保存エラー:", error);
                showToast("データの同期に失敗しました");
            }
        }

        async function saveReservation() {
            const name = reserverNameInput.value.trim();
            const purpose = reservationPurposeInput.value.trim();

            if (!name) {
                reserverNameInput.classList.add('border-red-500');
                reserverNameInput.classList.add('animate-pulse');
                setTimeout(() => reserverNameInput.classList.remove('animate-pulse'), 500);
                return;
            }

            const dateStr = currentEditingDate;

            if (!reservations[dateStr]) {
                reservations[dateStr] = {};
            }

            let isUpdate = false;
            currentSelectedCells.forEach(cell => {
                const cellKey = `${cell.timeIdx}_${cell.facIdx}`;
                if (reservations[dateStr][cellKey]) isUpdate = true;
                reservations[dateStr][cellKey] = { name, purpose };
            });

            closeModal();
            await syncToDatabase(dateStr);
            showToast(isUpdate ? '予約を更新しました' : '予約を保存しました');
        }

        async function cancelReservation() {
            const dateStr = currentEditingDate;

            currentSelectedCells.forEach(cell => {
                const cellKey = `${cell.timeIdx}_${cell.facIdx}`;
                if (reservations[dateStr] && reservations[dateStr][cellKey]) {
                    delete reservations[dateStr][cellKey];
                }
            });
                
            if (reservations[dateStr] && Object.keys(reservations[dateStr]).length === 0) {
                delete reservations[dateStr];
            }

            closeModal();
            await syncToDatabase(dateStr);
            showToast('予約をキャンセルしました');
        }

        function updateView() {
            const dateStr = formatDateForInput(currentDate);
            datePicker.value = dateStr;
            currentDateDisplay.textContent = formatDateForDisplay(currentDate);
            
            renderTableHeaders();
            renderTableBody(dateStr);
        }

        function setupEventListeners() {
            document.addEventListener('mouseup', () => {
                if (!isDragging) return;
                isDragging = false;

                if (currentSelectedCells.length > 0) {
                    openModal(currentEditingDate, currentSelectedCells, null);
                } else {
                    clearSelectionUI();
                }
            });

            datePicker.addEventListener('change', (e) => {
                const selectedDate = new Date(e.target.value);
                if (!isNaN(selectedDate.getTime())) {
                    currentDate = selectedDate;
                    updateView();
                }
            });

            todayBtn.addEventListener('click', () => {
                currentDate = new Date();
                updateView();
            });
        }

        // クラウドから最新データをリアルタイムで受け取る処理
        function setupRealtimeSync() {
            if (!db || !currentUser) return;
            const reservationsRef = collection(db, 'artifacts', appId, 'public', 'data', 'facility_reservations');
            
            onSnapshot(reservationsRef, (snapshot) => {
                reservations = {};
                snapshot.forEach((doc) => {
                    reservations[doc.id] = doc.data().slots || {};
                });
                updateView(); // 変更があったら画面を更新
            }, (error) => {
                console.error("同期エラー:", error);
            });
        }

        function init() {
            setupEventListeners();
            updateView();

            // クラウドデータベースの初期化
            if (firebaseConfig) {
                try {
                    const app = initializeApp(firebaseConfig);
                    auth = getAuth(app);
                    db = getFirestore(app);

                    const initAuth = async () => {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    };

                    initAuth().catch(console.error);

                    onAuthStateChanged(auth, (user) => {
                        currentUser = user;
                        if (user) {
                            setupRealtimeSync(); // 認証成功後にリアルタイム同期を開始
                        }
                    });
                } catch (e) {
                    console.error("データベースセットアップエラー:", e);
                }
            } else {
                console.warn("クラウド設定がありません。リロードするとデータは消えます。");
            }
        }

        // DOMロード時に初期化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
